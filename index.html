<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingTools - AI Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-md mx-auto">
        <!-- Hero -->
        <div class="pt-16 pb-12 px-6 text-center">
            <div class="inline-flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full mb-6">
                <span class="text-violet-400 text-xl">✨</span>
                <span class="font-medium">KingTools AI</span>
            </div>
            <h1 class="text-5xl font-bold tracking-tighter mb-3">Image Studio</h1>
            <p class="text-zinc-400 text-lg">Powerful. Simple. Beautiful.</p>
        </div>

        <!-- Preview Image -->
        <div class="px-6 pb-10">
            <div class="bg-zinc-900 rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
                <img src="https://picsum.photos/id/1015/800/600" alt="Editor Preview" class="w-full">
            </div>
        </div>

        <!-- CTA -->
        <div class="px-6">
            <a href="image-studio.html" 
               class="block w-full bg-violet-600 hover:bg-violet-700 transition text-center py-4 rounded-2xl text-lg font-semibold">
                Launch Image Editor
            </a>
        </div>

        <div class="mt-8 px-6 text-center">
            <p class="text-xs text-zinc-500">Fully working • No signup required</p>
        </div>

        <!-- Feature Icons -->
        <div class="grid grid-cols-3 gap-6 mt-16 px-6 text-center text-sm">
            <div>
                <div class="text-3xl mb-2">🪄</div>
                <div class="font-medium">Magic Tools</div>
            </div>
            <div>
                <div class="text-3xl mb-2">🎨</div>
                <div class="font-medium">Filters & Effects</div>
            </div>
            <div>
                <div class="text-3xl mb-2">🧼</div>
                <div class="font-medium">Pixel Eraser</div>
            </div>
        </div>
    </div>

</body>
</html>
