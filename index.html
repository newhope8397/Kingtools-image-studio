<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="KingTools AI Image Studio">
    <title>KingTools - Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .canvas-container {
            background: 
                linear-gradient(45deg, #222 25%, transparent 25%) -50px 0 / 40px 40px,
                linear-gradient(45deg, transparent 75%, #222 75%) -50px 0 / 40px 40px,
                #1a1a1a;
            background-size: 40px 40px;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 160px; /* Extra space so tool panel never covers canvas */
        }
        
        canvas { 
            width: 100% !important;
            height: auto !important;
            max-height: 55vh;
            background: transparent; 
            border-radius: 12px; 
            touch-action: none; 
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .tool-panel {
            max-height: 38vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        
        .thumb { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .thumb.active { border-color: rgb(167 139 250); box-shadow: 0 0 0 3px rgba(167,139,250,0.4); }
        
        .nav-btn.active { color: rgb(167 139 250) !important; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900 fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-2xl">✕</button>
            <div class="flex gap-3">
                <button onclick="undo()" class="text-xl">↩</button>
                <button onclick="redo()" class="text-xl">↪</button>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="triggerUpload()" class="text-xl">📤</button>
            <button onclick="downloadImage()" class="text-xl">↓</button>
            <button onclick="finishEditing()" class="bg-violet-600 px-5 py-1.5 rounded-full text-sm font-medium">Done</button>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="flex justify-center items-center pt-16 pb-6 bg-black min-h-screen">
        <div class="canvas-container w-full max-w-md">
            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            <canvas id="main-canvas" class="w-full"></canvas>
        </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel" class="tool-panel fixed bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 z-40"></div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50">
        <div class="flex text-xs font-medium">
            <button onclick="switchTool(0)" id="nav-0" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 text-violet-400">
                <span class="text-2xl">✨</span><span>Magic</span>
            </button>
            <button onclick="switchTool(1)" id="nav-1" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
                <span class="text-2xl">🎨</span><span>Filters</span>
            </button>
            <button onclick="switchTool(2)" id="nav-2" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
                <span class="text-2xl">⚡</span><span>Effects</span>
            </button>
            <button onclick="switchTool(3)" id="nav-3" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
                <span class="text-2xl">🧼</span><span>Eraser</span>
            </button>
            <button onclick="switchTool(4)" id="nav-4" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
                <span class="text-2xl">✂️</span><span>Crop</span>
            </button>
            <button onclick="switchTool(5)" id="nav-5" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
                <span class="text-2xl">📊</span><span>Adjust</span>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let currentImage = null;
        let originalData = null;
        let historyStack = [];
        let historyIndex = -1;

        let adjustValues = { brightness: 100, contrast: 100, saturation: 100, temperature: 0, vignette: 0, sharpness: 0, clarity: 0 };
        let eraserSize = 35;
        let isErasing = false;
        let eraseMode = 'erase';
        let lastX = 0, lastY = 0;

        const filtersList = [
            {name:"Classic", filter:"none"},
            {name:"Ink", filter:"grayscale(100%) contrast(125%)"},
            {name:"Noir", filter:"grayscale(100%) brightness(75%) contrast(150%)"},
            {name:"Film", filter:"sepia(80%) brightness(90%) contrast(110%)"},
            {name:"Vivid", filter:"saturate(150%) contrast(110%)"},
            {name:"Chroma", filter:"hue-rotate(30deg) saturate(125%)"}
        ];

        function saveHistory() {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(canvas.toDataURL());
            historyIndex++;
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        function redo() {
            if (historyIndex >= historyStack.length - 1) return;
            historyIndex++;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        function loadSampleImage() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "https://picsum.photos/id/1015/800/800";
            img.onload = () => {
                currentImage = img;
                resetCanvasToImage();
                saveHistory();
            };
        }

        function resetCanvasToImage() {
            canvas.width = 800;
            const ratio = currentImage.width / currentImage.height;
            canvas.height = Math.round(800 / ratio);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function triggerUpload() { document.getElementById('image-upload').click(); }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    resetCanvasToImage();
                    saveHistory();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==================== ADJUST PANEL ====================
        function showAdjustPanel() {
            let html = `
                <div class="text-center font-medium mb-4">Adjust</div>
                <div class="space-y-6 px-2">
                    ${createSlider('Brightness', 'brightness', 50, 150, adjustValues.brightness)}
                    ${createSlider('Contrast', 'contrast', 50, 150, adjustValues.contrast)}
                    ${createSlider('Saturation', 'saturation', 0, 200, adjustValues.saturation)}
                    ${createSlider('Temperature', 'temperature', -50, 50, adjustValues.temperature)}
                    ${createSlider('Vignette', 'vignette', 0, 80, adjustValues.vignette)}
                    ${createSlider('Sharpness', 'sharpness', 0, 100, adjustValues.sharpness)}
                    ${createSlider('Clarity', 'clarity', 0, 100, adjustValues.clarity)}
                </div>
                <button onclick="resetToOriginal()" class="mt-8 w-full bg-zinc-800 py-3 rounded-2xl text-sm font-medium">Reset All</button>
            `;
            document.getElementById('tool-panel').innerHTML = html;
            applyAdjustFilters();
        }

        function createSlider(label, key, min, max, value) {
            return `
                <div>
                    <div class="flex justify-between text-sm mb-1.5">
                        <span>${label}</span>
                        <span id="\( {key}-val" class="text-violet-400 font-medium"> \){Math.round(value)}</span>
                    </div>
                    <input type="range" min="\( {min}" max=" \){max}" value="${value}" 
                           oninput="updateAdjust('${key}', this.value)" 
                           class="w-full accent-violet-500">
                </div>
            `;
        }

        function updateAdjust(key, val) {
            adjustValues[key] = parseFloat(val);
            document.getElementById(key + '-val').textContent = Math.round(val);
            applyAdjustFilters();
        }

        function applyAdjustFilters() {
            if (!currentImage) return;
            let filterStr = `brightness(\( {adjustValues.brightness}%) contrast( \){adjustValues.contrast}%) saturate(${adjustValues.saturation}%)`;
            if (adjustValues.temperature !== 0) filterStr += ` hue-rotate(${adjustValues.temperature * 1.8}deg)`;

            ctx.save();
            ctx.filter = filterStr;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (adjustValues.vignette > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(0,0,0,${Math.min(adjustValues.vignette / 200, 0.65)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
            saveHistory();
        }

        function resetToOriginal() {
            if (originalData) {
                ctx.putImageData(originalData, 0, 0);
                adjustValues = { brightness: 100, contrast: 100, saturation: 100, temperature: 0, vignette: 0, sharpness: 0, clarity: 0 };
                saveHistory();
            }
        }

        // ==================== ERASER (Smooth) ====================
        function showEraserPanel() {
            document.getElementById('tool-panel').innerHTML = `
                <div class="text-center font-medium mb-3">Pixel Eraser</div>
                <div class="flex gap-2 mb-4">
                    <button onclick="toggleEraseMode('erase')" class="bg-violet-600 flex-1 py-2.5 rounded-xl text-sm font-medium">Erase</button>
                    <button onclick="toggleEraseMode('restore')" class="bg-zinc-700 flex-1 py-2.5 rounded-xl text-sm font-medium">Restore</button>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between text-sm mb-1"><span>Brush Size</span><span id="size-val">${eraserSize}</span></div>
                    <input type="range" min="8" max="120" value="${eraserSize}" oninput="setEraserSize(this.value)" class="w-full accent-violet-500">
                </div>
                <div class="text-xs text-zinc-400 text-center">Checkerboard shows transparent areas</div>
                <button onclick="document.getElementById('tool-panel').classList.add('hidden')" class="mt-8 w-full bg-violet-600 py-3 rounded-2xl text-sm font-medium">Done</button>
            `;
            initEraser();
        }

        function setEraserSize(size) {
            eraserSize = parseInt(size);
            document.getElementById('size-val').textContent = eraserSize;
        }

        function toggleEraseMode(mode) { eraseMode = mode; }

        function initEraser() {
            canvas.removeEventListener('pointerdown', startErase);
            canvas.removeEventListener('pointermove', doErase);
            canvas.removeEventListener('pointerup', stopErase);
            canvas.removeEventListener('pointerleave', stopErase);

            canvas.addEventListener('pointerdown', startErase);
            canvas.addEventListener('pointermove', doErase);
            canvas.addEventListener('pointerup', stopErase);
            canvas.addEventListener('pointerleave', stopErase);
        }

        function startErase(e) {
            isErasing = true;
            const pos = getCanvasPos(e);
            lastX = pos.x; lastY = pos.y;
            doErase(e);
        }

        function stopErase() {
            if (isErasing) saveHistory();
            isErasing = false;
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }

        function doErase(e) {
            if (!isErasing) return;
            const pos = getCanvasPos(e);
            ctx.save();
            ctx.globalCompositeOperation = eraseMode === 'erase' ? 'destination-out' : 'source-over';
            ctx.lineWidth = eraserSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.restore();
            lastX = pos.x; lastY = pos.y;
        }

        // ==================== OTHER PANELS ====================
        function showMagicStudioPanel() {
            document.getElementById('tool-panel').innerHTML = `
                <div class="text-center font-medium mb-4">Magic Studio</div>
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="magicAction('Magic Edit')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">🪄 Magic Edit</div>
                    <div onclick="magicAction('Magic Expand')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">📏 Magic Expand</div>
                    <div onclick="magicAction('Magic Grab')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">🖐️ Magic Grab</div>
                    <div onclick="magicAction('Grab Text')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">Aa Grab Text</div>
                    <div onclick="magicAction('BG Remover')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">🖼️ BG Remover</div>
                    <div onclick="magicAction('BG Generator')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">🌄 BG Generator</div>
                </div>
            `;
        }

        function showFiltersPanel() {
            let html = `<div class="text-center font-medium mb-4">Filters</div><div class="flex gap-3 overflow-x-auto pb-6">`;
            filtersList.forEach(f => {
                html += `<div onclick="applyFilter('\( {f.filter}')" class="flex-shrink-0 text-center cursor-pointer"><img src="https://picsum.photos/id/101/68/68" class="thumb"><p class="text-xs mt-1"> \){f.name}</p></div>`;
            });
            html += `</div><button onclick="resetToOriginal()" class="mt-4 w-full bg-zinc-800 py-3 rounded-2xl">Reset</button>`;
            document.getElementById('tool-panel').innerHTML = html;
        }

        function showEffectsPanel() {
            document.getElementById('tool-panel').innerHTML = `
                <div class="text-center font-medium mb-4">Effects</div>
                <div class="grid grid-cols-4 gap-4">
                    <div onclick="applyEffect('Shadows')" class="text-center cursor-pointer"><div class="w-16 h-16 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">🌑</div><p class="text-xs mt-1">Shadows</p></div>
                    <div onclick="applyEffect('Duotone')" class="text-center cursor-pointer"><div class="w-16 h-16 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">🎨</div><p class="text-xs mt-1">Duotone</p></div>
                    <div onclick="applyEffect('Blur')" class="text-center cursor-pointer"><div class="w-16 h-16 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">🌫️</div><p class="text-xs mt-1">Blur</p></div>
                    <div onclick="applyEffect('Face Retouch')" class="text-center cursor-pointer"><div class="w-16 h-16 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">✨</div><p class="text-xs mt-1">Retouch</p></div>
                </div>
            `;
        }

        function showCropPanel() {
            document.getElementById('tool-panel').innerHTML = `
                <div class="text-center font-medium mb-4">Crop</div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button onclick="alert('Original')" class="bg-zinc-800 py-3 rounded-2xl text-sm">Original</button>
                    <button onclick="alert('1:1')" class="bg-zinc-800 py-3 rounded-2xl text-sm">1:1</button>
                    <button onclick="alert('16:9')" class="bg-zinc-800 py-3 rounded-2xl text-sm">16:9</button>
                </div>
                <p class="text-center text-zinc-400 text-sm">Crop grid will appear on canvas (drag handles coming soon)</p>
            `;
        }

        function applyFilter(css) {
            if (!currentImage) return;
            ctx.save();
            ctx.filter = css;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            saveHistory();
        }

        function applyEffect(name) {
            alert(`Applied ${name} effect`);
            saveHistory();
        }

        function magicAction(action) {
            alert(`🔮 ${action} activated!`);
            saveHistory();
        }

        function switchTool(n) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + n).classList.add('active');

            const panel = document.getElementById('tool-panel');
            panel.classList.remove('hidden');

            if (n === 0) showMagicStudioPanel();
            else if (n === 1) showFiltersPanel();
            else if (n === 2) showEffectsPanel();
            else if (n === 3) showEraserPanel();
            else if (n === 4) showCropPanel();
            else if (n === 5) showAdjustPanel();
        }

        function downloadImage() {
            const a = document.createElement('a');
            a.download = 'kingtools-edit.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        function finishEditing() {
            alert("✅ KingTools Image Studio ready!\nCanvas covering fixed + all tools restored.");
        }

        window.onload = () => {
            loadSampleImage();
            setTimeout(() => switchTool(0), 400); // Start with Magic like Picsart
        };
    </script>
</body>
</html>
