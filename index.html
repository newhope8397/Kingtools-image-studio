<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KingTools - Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { max-height: 65vh; background: #111; border-radius: 12px; touch-action: none; }
        .filter-thumb, .effect-thumb { 
            width: 68px; height: 68px; 
            border-radius: 8px; 
            object-fit: cover; 
            border: 2px solid transparent; 
        }
        .filter-thumb.active, .effect-thumb.active { 
            border-color: rgb(167 139 250); 
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.4);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-2xl">✕</button>
            <div class="flex gap-3">
                <button onclick="undo()" class="text-xl">↩</button>
                <button onclick="redo()" class="text-xl">↪</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="downloadImage()" class="text-xl">↓</button>
            <button onclick="finishEditing()" class="bg-violet-600 px-6 py-1.5 rounded-full text-sm font-medium">Done</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="flex justify-center items-center p-4 bg-black min-h-[65vh]">
        <div class="relative w-full max-w-md">
            <canvas id="main-canvas" width="800" height="800" class="w-full shadow-2xl"></canvas>
        </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel" class="fixed bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 max-h-[42vh] overflow-auto"></div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800">
        <div class="flex text-xs font-medium">
            <button onclick="switchTool(0)" class="flex-1 py-4 flex flex-col items-center gap-1 text-violet-400">
                <span class="text-2xl">✨</span>
                <span>Magic</span>
            </button>
            <button onclick="switchTool(1)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">🎨</span>
                <span>Filters</span>
            </button>
            <button onclick="switchTool(2)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">⚡</span>
                <span>Effects</span>
            </button>
            <button onclick="switchTool(3)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">🧼</span>
                <span>Eraser</span>
            </button>
            <button onclick="switchTool(4)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">✂️</span>
                <span>Crop</span>
            </button>
        </div>
    </div>

    <script src="js/eraser.js"></script>
    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let currentImage = null;
        let originalData = null;
        let historyStack = [];
        let historyIndex = -1;

        const filtersList = [
            {name:"Classic", filter:"none"},
            {name:"Ink", filter:"grayscale(100%) contrast(125%)"},
            {name:"Noir", filter:"grayscale(100%) brightness(75%) contrast(150%)"},
            {name:"Film", filter:"sepia(80%) brightness(90%) contrast(110%)"},
            {name:"Mono", filter:"grayscale(100%)"},
            {name:"Vivid", filter:"saturate(150%) contrast(110%)"},
            {name:"Chroma", filter:"hue-rotate(30deg) saturate(125%)"},
            {name:"Rustiq", filter:"sepia(60%) hue-rotate(15deg)"},
            {name:"Eldar", filter:"brightness(110%) saturate(75%)"},
            {name:"Zeal", filter:"hue-rotate(90deg) saturate(125%)"}
        ];

        const effectsList = [
            {name:"Shadows", emoji:"🌑", desc:"Add depth"},
            {name:"Duotone", emoji:"🎨", desc:"Two-tone effect"},
            {name:"Blur", emoji:"🌫️", desc:"Soft focus"},
            {name:"Auto Focus", emoji:"🔍", desc:"Sharp subject"},
            {name:"Face Retouch", emoji:"✨", desc:"Smooth skin"}
        ];

        function saveHistory() {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(canvas.toDataURL());
            historyIndex++;
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        function redo() {
            if (historyIndex >= historyStack.length-1) return;
            historyIndex++;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        function loadSampleImage() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "https://picsum.photos/id/1015/800/800";
            img.onload = () => {
                currentImage = img;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                saveHistory();
                initEraser();
            };
        }

        function applyFilter(css) {
            if (!currentImage) return;
            ctx.save();
            ctx.filter = css;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            ctx.filter = 'none';
            saveHistory();
        }

        function resetToOriginal() {
            if (originalData) {
                ctx.putImageData(originalData, 0, 0);
                saveHistory();
            }
        }

        function showFiltersPanel() {
            let html = `<div class="text-center font-medium mb-4">Filters</div>`;
            html += `<div class="flex gap-3 overflow-x-auto pb-6 snap-x">`;
            filtersList.forEach(f => {
                html += `
                    <div onclick="applyFilter('${f.filter}'); highlightActive(this)" class="flex-shrink-0 text-center cursor-pointer">
                        <img src="https://picsum.photos/id/101/68/68" class="filter-thumb" alt="${f.name}">
                        <p class="text-xs mt-1 text-zinc-400">${f.name}</p>
                    </div>
                `;
            });
            html += `</div>`;
            html += `<button onclick="resetToOriginal()" class="mt-4 w-full bg-zinc-800 py-3 rounded-2xl text-sm">Reset to Original</button>`;
            document.getElementById('tool-panel').innerHTML = html;
        }

        function showEffectsPanel() {
            let html = `<div class="text-center font-medium mb-4">Effects</div>`;
            html += `<div class="grid grid-cols-4 gap-4">`;
            effectsList.forEach(effect => {
                html += `
                    <div onclick="applyEffect('${effect.name}')" 
                         class="text-center cursor-pointer">
                        <div class="w-16 h-16 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl mb-2">
                            ${effect.emoji}
                        </div>
                        <p class="text-xs text-zinc-400">${effect.name}</p>
                    </div>
                `;
            });
            html += `</div>`;
            document.getElementById('tool-panel').innerHTML = html;
        }

        function applyEffect(name) {
            alert(`✅ ${name} effect applied! (Simulation - full implementation coming next)`);
            saveHistory();
        }

        function showMagicStudioPanel() {
            let html = `<div class="text-center font-medium mb-4">Magic Studio</div>`;
            html += `
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="magicAction('Magic Edit')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">🪄</div>
                        <p class="font-medium">Magic Edit</p>
                    </div>
                    <div onclick="magicAction('Magic Expand')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">📏</div>
                        <p class="font-medium">Magic Expand</p>
                    </div>
                    <div onclick="magicAction('Magic Grab')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">🖐️</div>
                        <p class="font-medium">Magic Grab</p>
                    </div>
                    <div onclick="magicAction('Grab Text')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">Aa</div>
                        <p class="font-medium">Grab Text</p>
                    </div>
                    <div onclick="magicAction('BG Remover')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">🖼️</div>
                        <p class="font-medium">BG Remover</p>
                    </div>
                    <div onclick="magicAction('BG Generator')" class="bg-zinc-800 p-4 rounded-3xl text-center cursor-pointer hover:bg-zinc-700">
                        <div class="text-3xl mb-2">🌄</div>
                        <p class="font-medium">BG Generator</p>
                    </div>
                </div>
            `;
            document.getElementById('tool-panel').innerHTML = html;
        }

        function magicAction(action) {
            alert(`🔮 ${action} activated!\n\n(Real AI features will be added later via backend)`);
            saveHistory();
        }

        function highlightActive(el) {
            document.querySelectorAll('.filter-thumb').forEach(t => t.classList.remove('active'));
            const thumb = el.querySelector('.filter-thumb');
            if (thumb) thumb.classList.add('active');
        }

        function downloadImage() {
            const a = document.createElement('a');
            a.download = 'kingtools-edit.png';
            a.href = canvas.toDataURL();
            a.click();
        }

        function finishEditing() {
            alert("✅ Editing complete!");
        }

        function switchTool(n) {
            const panel = document.getElementById('tool-panel');
            panel.classList.remove('hidden');

            if (n === 0) showMagicStudioPanel();
            else if (n === 1) showFiltersPanel();
            else if (n === 2) showEffectsPanel();
            else if (n === 3) {
                panel.innerHTML = `
                    <div class="text-center font-medium mb-3">Pixel Eraser</div>
                    <div class="flex gap-2 mb-4">
                        <button onclick="toggleEraseMode('erase')" class="bg-violet-600 flex-1 py-2 rounded-xl">Erase</button>
                        <button onclick="toggleEraseMode('restore')" class="bg-zinc-700 flex-1 py-2 rounded-xl">Restore</button>
                    </div>
                    <div>
                        <div class="flex justify-between text-sm mb-1"><span>Size</span><span id="size-val">30</span></div>
                        <input type="range" min="5" max="100" value="30" 
                               oninput="setEraserSize(this.value); document.getElementById('size-val').textContent=this.value" 
                               class="w-full accent-violet-500">
                    </div>
                    <button onclick="document.getElementById('tool-panel').classList.add('hidden')" class="mt-6 w-full bg-violet-600 py-3 rounded-2xl">Done</button>
                `;
            } else {
                panel.innerHTML = `<p class="text-center py-12 text-zinc-400">Crop tool coming soon...</p>`;
            }
        }

        window.onload = loadSampleImage;
    </script>
</body>
</html>
