<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KingTools - Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .canvas-container {
            background: 
                linear-gradient(45deg, #222 25%, transparent 25%) -50px 0 / 100px 100px,
                linear-gradient(45deg, transparent 75%, #222 75%) -50px 0 / 100px 100px,
                #1a1a1a;
            background-size: 40px 40px;
            border-radius: 16px;
            padding: 12px;
        }
        
        canvas { 
            max-height: 65vh; 
            background: transparent; 
            border-radius: 12px; 
            touch-action: none; 
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .thumb { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .thumb.active { border-color: rgb(167 139 250); box-shadow: 0 0 0 3px rgba(167,139,250,0.4); }
        
        .slider-label { font-size: 13px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-2xl">✕</button>
            <div class="flex gap-3">
                <button onclick="undo()" class="text-xl">↩</button>
                <button onclick="redo()" class="text-xl">↪</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="downloadImage()" class="text-xl">↓</button>
            <button onclick="finishEditing()" class="bg-violet-600 px-6 py-1.5 rounded-full text-sm font-medium">Done</button>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="flex justify-center items-center p-4 bg-black min-h-[65vh]">
        <div class="canvas-container w-full max-w-md">
            <canvas id="main-canvas" width="800" height="800" class="w-full"></canvas>
        </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel" class="fixed bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 max-h-[42vh] overflow-auto"></div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800">
        <div class="flex text-xs font-medium">
            <button onclick="switchTool(0)" class="flex-1 py-4 flex flex-col items-center gap-1 text-violet-400">
                <span class="text-2xl">✨</span><span>Magic</span>
            </button>
            <button onclick="switchTool(1)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">🎨</span><span>Filters</span>
            </button>
            <button onclick="switchTool(2)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">⚡</span><span>Effects</span>
            </button>
            <button onclick="switchTool(3)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">🧼</span><span>Eraser</span>
            </button>
            <button onclick="switchTool(4)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">✂️</span><span>Crop</span>
            </button>
            <button onclick="switchTool(5)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">📊</span><span>Adjust</span>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let currentImage = null;
        let originalData = null;
        let historyStack = [];
        let historyIndex = -1;

        // Adjust values
        let adjustValues = {
            brightness: 100,
            contrast: 100,
            saturation: 100,
            temperature: 0,
            vignette: 0
        };

        // Filters
        const filtersList = [
            {name:"Classic", filter:"none"},
            {name:"Ink", filter:"grayscale(100%) contrast(125%)"},
            {name:"Noir", filter:"grayscale(100%) brightness(75%) contrast(150%)"},
            {name:"Film", filter:"sepia(80%) brightness(90%) contrast(110%)"},
            {name:"Mono", filter:"grayscale(100%)"},
            {name:"Vivid", filter:"saturate(150%) contrast(110%)"},
            {name:"Chroma", filter:"hue-rotate(30deg) saturate(125%)"},
            {name:"Rustiq", filter:"sepia(60%) hue-rotate(15deg)"},
            {name:"Eldar", filter:"brightness(110%) saturate(75%)"},
            {name:"Zeal", filter:"hue-rotate(90deg) saturate(125%)"}
        ];

        const effectsList = [
            {name:"Shadows", emoji:"🌑"},
            {name:"Duotone", emoji:"🎨"},
            {name:"Blur", emoji:"🌫️"},
            {name:"Auto Focus", emoji:"🔍"},
            {name:"Face Retouch", emoji:"✨"}
        ];

        function saveHistory() {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(canvas.toDataURL());
            historyIndex++;
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
        }

        function redo() {
            if (historyIndex >= historyStack.length - 1) return;
            historyIndex++;
            const img = new Image();
            img.src = historyStack[historyIndex];
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
        }

        function loadSampleImage() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "https://picsum.photos/id/1015/800/800";
            img.onload = () => {
                currentImage = img;
                resetCanvas();
                saveHistory();
            };
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function applyFilter(css) {
            if (!currentImage) return;
            ctx.save();
            ctx.filter = css;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            ctx.filter = 'none';
            saveHistory();
        }

        function resetToOriginal() {
            if (originalData) {
                ctx.putImageData(originalData, 0, 0);
                adjustValues = { brightness: 100, contrast: 100, saturation: 100, temperature: 0, vignette: 0 };
                saveHistory();
            }
        }

        // === Adjust Panel ===
        function showAdjustPanel() {
            let html = `
                <div class="text-center font-medium mb-4">Adjust</div>
                <div class="space-y-6">
                    ${createSlider('Brightness', 'brightness', 50, 150, adjustValues.brightness)}
                    ${createSlider('Contrast', 'contrast', 50, 150, adjustValues.contrast)}
                    ${createSlider('Saturation', 'saturation', 0, 200, adjustValues.saturation)}
                    ${createSlider('Temperature', 'temperature', -50, 50, adjustValues.temperature)}
                    ${createSlider('Vignette', 'vignette', 0, 100, adjustValues.vignette)}
                </div>
                <button onclick="resetToOriginal()" class="mt-6 w-full bg-zinc-800 py-3 rounded-2xl text-sm">Reset All</button>
            `;
            document.getElementById('tool-panel').innerHTML = html;
            applyAdjustFilters(); // initial apply
        }

        function createSlider(label, key, min, max, value) {
            return `
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="slider-label">${label}</span>
                        <span id="\( {key}-val" class="text-violet-400"> \){value}</span>
                    </div>
                    <input type="range" min="\( {min}" max=" \){max}" value="${value}" 
                           oninput="updateAdjust('${key}', this.value)" 
                           class="w-full accent-violet-500">
                </div>
            `;
        }

        function updateAdjust(key, val) {
            adjustValues[key] = parseFloat(val);
            document.getElementById(key + '-val').textContent = val;
            applyAdjustFilters();
        }

        function applyAdjustFilters() {
            if (!currentImage) return;
            
            let filterStr = `
                brightness(${adjustValues.brightness}%) 
                contrast(${adjustValues.contrast}%) 
                saturate(${adjustValues.saturation}%)
            `;

            // Simple temperature simulation via hue
            if (adjustValues.temperature !== 0) {
                filterStr += ` hue-rotate(${adjustValues.temperature * 1.8}deg)`;
            }

            ctx.save();
            ctx.filter = filterStr.trim();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Vignette simulation (simple overlay for now)
            if (adjustValues.vignette > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(0,0,0,${adjustValues.vignette / 300})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            saveHistory();
        }

        // === Eraser (basic pixel eraser with checkerboard visible) ===
        function showEraserPanel() {
            document.getElementById('tool-panel').innerHTML = `
                <div class="text-center font-medium mb-3">Pixel Eraser</div>
                <div class="flex gap-2 mb-4">
                    <button onclick="toggleEraseMode('erase')" class="bg-violet-600 flex-1 py-2 rounded-xl text-sm">Erase</button>
                    <button onclick="toggleEraseMode('restore')" class="bg-zinc-700 flex-1 py-2 rounded-xl text-sm">Restore</button>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between text-sm mb-1"><span>Brush Size</span><span id="size-val">30</span></div>
                    <input type="range" min="5" max="120" value="30" 
                           oninput="setEraserSize(this.value); document.getElementById('size-val').textContent=this.value" 
                           class="w-full accent-violet-500">
                </div>
                <div class="text-xs text-zinc-400 text-center">
                    Checkerboard shows transparent areas<br>
                    (Real brush coming soon)
                </div>
                <button onclick="document.getElementById('tool-panel').classList.add('hidden')" 
                        class="mt-6 w-full bg-violet-600 py-3 rounded-2xl">Done</button>
            `;
            initEraser(); // from external or basic here
        }

        // Basic eraser setup (you can expand from eraser.js)
        let eraserSize = 30;
        let isErasing = false;
        let eraseMode = 'erase';

        function setEraserSize(size) {
            eraserSize = parseInt(size);
        }

        function toggleEraseMode(mode) {
            eraseMode = mode;
        }

        function initEraser() {
            canvas.addEventListener('pointerdown', startErase);
            canvas.addEventListener('pointermove', doErase);
            canvas.addEventListener('pointerup', stopErase);
            canvas.addEventListener('pointerleave', stopErase);
        }

        function startErase(e) { isErasing = true; doErase(e); }
        function stopErase() { isErasing = false; saveHistory(); }

        function doErase(e) {
            if (!isErasing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
            
            ctx.save();
            ctx.globalCompositeOperation = eraseMode === 'erase' ? 'destination-out' : 'source-over';
            ctx.beginPath();
            ctx.arc(x, y, eraserSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,1)';
            ctx.fill();
            ctx.restore();
        }

        function showMagicStudioPanel() { /* unchanged */ 
            // ... (keep your original magic panel)
            let html = `<div class="text-center font-medium mb-4">Magic Studio</div>`;
            html += `... your existing magic grid ...`;
            document.getElementById('tool-panel').innerHTML = html;
        }

        function showFiltersPanel() { /* your original */ }
        function showEffectsPanel() { /* your original */ }

        function switchTool(n) {
            const panel = document.getElementById('tool-panel');
            panel.classList.remove('hidden');

            if (n === 0) showMagicStudioPanel();
            else if (n === 1) showFiltersPanel();
            else if (n === 2) showEffectsPanel();
            else if (n === 3) showEraserPanel();
            else if (n === 4) panel.innerHTML = `<p class="text-center py-12 text-zinc-400">Crop tool coming soon...</p>`;
            else if (n === 5) showAdjustPanel();
        }

        function downloadImage() {
            const a = document.createElement('a');
            a.download = 'kingtools-edit.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        function finishEditing() {
            alert("✅ Editing complete! Great work on the Adjust panel and checkerboard.");
        }

        // Magic & Effects placeholders (keep as-is or expand)
        function magicAction(action) {
            alert(`🔮 ${action} activated!\n\nReal AI coming later.`);
            saveHistory();
        }

        function applyEffect(name) {
            alert(`Applied ${name} effect (demo)`);
            saveHistory();
        }

        window.onload = loadSampleImage;
    </script>
</body>
</html>
