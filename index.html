<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KingTools - Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { max-height: 65vh; background: #111; border-radius: 12px; touch-action: none; }
        .filter-thumb { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .filter-thumb.active { border-color: rgb(167 139 250); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-2xl">✕</button>
            <div class="flex gap-3">
                <button onclick="undo()" class="text-xl">↩</button>
                <button onclick="redo()" class="text-xl">↪</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="downloadImage()" class="text-xl">↓</button>
            <button onclick="finishEditing()" 
                    class="bg-violet-600 hover:bg-violet-500 px-6 py-1.5 rounded-full text-sm font-medium">
                Done
            </button>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="flex justify-center items-center p-4 bg-black min-h-[65vh]">
        <div id="canvas-container" class="relative w-full max-w-md">
            <canvas id="main-canvas" width="800" height="800" class="w-full shadow-2xl"></canvas>
        </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel" class="fixed bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 max-h-[42vh] overflow-auto">
        <!-- Dynamic content -->
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800">
        <div class="flex text-xs font-medium">
            <button onclick="switchTool(0)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">✨</span>
                <span>Magic</span>
            </button>
            <button onclick="switchTool(1)" class="flex-1 py-4 flex flex-col items-center gap-1 text-violet-400">
                <span class="text-2xl">🎨</span>
                <span>Filters</span>
            </button>
            <button onclick="switchTool(2)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">⚡</span>
                <span>Effects</span>
            </button>
            <button onclick="switchTool(3)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">🧼</span>
                <span>Eraser</span>
            </button>
            <button onclick="switchTool(4)" class="flex-1 py-4 flex flex-col items-center gap-1">
                <span class="text-2xl">✂️</span>
                <span>Crop</span>
            </button>
        </div>
    </div>

    <script src="js/eraser.js"></script>
    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let currentImage = null;
        let originalImageData = null;
        let historyStack = [];
        let historyIndex = -1;

        const filters = [
            { name: "Classic", class: "" },
            { name: "Ink", class: "grayscale contrast-125" },
            { name: "Noir", class: "grayscale brightness-75 contrast-150" },
            { name: "Film", class: "sepia brightness-90 contrast-110" },
            { name: "Mono", class: "grayscale" },
            { name: "Vivid", class: "saturate-150 contrast-110" },
            { name: "Chroma", class: "hue-rotate-30 saturate-125" },
            { name: "Rustiq", class: "sepia hue-rotate-15" },
            { name: "Eldar", class: "brightness-110 saturate-75" },
            { name: "Zeal", class: "hue-rotate-90 saturate-125" }
        ];

        function saveToHistory() {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(canvas.toDataURL('image/png'));
            historyIndex++;
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            loadHistoryImage(historyStack[historyIndex]);
        }

        function redo() {
            if (historyIndex >= historyStack.length - 1) return;
            historyIndex++;
            loadHistoryImage(historyStack[historyIndex]);
        }

        function loadHistoryImage(dataUrl) {
            const img = new Image();
            img.src = dataUrl;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
        }

        function loadSampleImage() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "https://picsum.photos/id/1015/800/800";
            img.onload = () => {
                currentImage = img;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                saveToHistory();
                initEraser();
            };
        }

        function applyFilter(filterClass) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = filterClass ? filterClass.replace(/ /g, ' ') : 'none'; // simple CSS filter mapping
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';
            saveToHistory();
        }

        function showFiltersPanel() {
            const panel = document.getElementById('tool-panel');
            let html = `<div class="text-center font-medium mb-4">Filters</div>`;
            html += `<div class="flex gap-3 overflow-x-auto pb-4 snap-x">`;
            
            filters.forEach((f, i) => {
                html += `
                    <div onclick="applyFilter('${f.class}'); highlightActive(this)" 
                         class="flex-shrink-0 text-center cursor-pointer snap-start">
                        <img src="https://picsum.photos/id/${100 + i}/68/68" 
                             class="filter-thumb mx-auto" alt="${f.name}">
                        <p class="text-xs mt-1 text-zinc-400">${f.name}</p>
                    </div>
                `;
            });
            
            html += `</div>`;
            html += `<button onclick="resetToOriginal()" class="mt-4 w-full bg-zinc-800 py-3 rounded-2xl text-sm">Reset to Original</button>`;
            panel.innerHTML = html;
        }

        function highlightActive(el) {
            document.querySelectorAll('.filter-thumb').forEach(t => t.classList.remove('active'));
            el.querySelector('.filter-thumb').classList.add('active');
        }

        function resetToOriginal() {
            ctx.putImageData(originalImageData, 0, 0);
            saveToHistory();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'kingtools-edited.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function finishEditing() {
            alert("✅ Image ready! Use Download button.");
        }

        function switchTool(n) {
            const panel = document.getElementById('tool-panel');
            panel.classList.remove('hidden');

            if (n === 1) { // Filters
                showFiltersPanel();
            } else if (n === 3) { // Pixel Eraser
                panel.innerHTML = `
                    <div class="text-center font-medium mb-3">Pixel Eraser</div>
                    <div class="flex gap-2 justify-center mb-4">
                        <button onclick="toggleEraseMode('erase')" 
                                class="bg-violet-600 text-white px-6 py-2 rounded-xl flex-1">Erase</button>
                        <button onclick="toggleEraseMode('restore')" 
                                class="bg-zinc-700 hover:bg-zinc-600 px-6 py-2 rounded-xl flex-1">Restore</button>
                    </div>
                    <div class="mb-3">
                        <div class="flex justify-between text-sm mb-1">
                            <span>Size</span>
                            <span id="size-value">30</span>
                        </div>
                        <input type="range" min="5" max="100" value="30" 
                               oninput="setEraserSize(this.value); document.getElementById('size-value').textContent = this.value"
                               class="w-full accent-violet-500">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <span>Show original</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" onchange="alert('Show original - coming soon')">
                            <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-violet-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-violet-600"></div>
                        </label>
                    </div>
                    <button onclick="document.getElementById('tool-panel').classList.add('hidden')" 
                            class="mt-6 w-full bg-violet-600 py-3 rounded-2xl font-medium">
                        Done
                    </button>
                `;
            } else {
                panel.innerHTML = `<p class="text-center py-12 text-zinc-400">Panel for ${['Magic Studio','Effects','Crop'][n]} coming soon...</p>`;
            }
        }

        window.onload = () => {
            loadSampleImage();
        };
    </script>
</body>
</html>
