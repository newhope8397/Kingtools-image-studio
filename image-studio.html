<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KingTools - Image Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .canvas-container {
            background: linear-gradient(45deg, #222 25%, transparent 25%) -50px 0 / 40px 40px,
                        linear-gradient(45deg, transparent 75%, #222 75%) -50px 0 / 40px 40px,
                        #1a1a1a;
            background-size: 40px 40px;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
        }
        
        canvas { 
            width: 100% !important;
            height: auto !important;
            max-height: 58vh;
            border-radius: 14px;
            box-shadow: 0 10px 30px -10px rgb(0 0 0 / 0.5);
            touch-action: none;
        }
        
        .tool-panel {
            max-height: 42vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        
        .nav-btn.active { 
            color: rgb(167 139 250) !important; 
            background-color: #27272a; 
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: rgb(167 139 250);
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900 fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-2xl">🏠</a>
            <div class="flex gap-3">
                <button onclick="undo()" class="text-2xl hover:text-violet-400 transition">↩</button>
                <button onclick="redo()" class="text-2xl hover:text-violet-400 transition">↪</button>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="triggerUpload()" class="text-2xl hover:text-violet-400">📤</button>
            <button onclick="downloadImage()" class="text-2xl hover:text-violet-400">↓</button>
            <button onclick="finishEditing()" class="bg-violet-600 hover:bg-violet-700 px-6 py-2 rounded-3xl text-sm font-semibold">Done</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="flex justify-center items-center pt-16 pb-6 bg-black min-h-screen">
        <div class="canvas-container w-full max-w-md">
            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel" class="tool-panel fixed bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 z-40 hidden"></div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50">
        <div class="flex text-xs font-medium">
            <button onclick="switchTool(0)" id="nav-0" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 text-violet-400"><span class="text-2xl">✨</span><span>Magic</span></button>
            <button onclick="switchTool(1)" id="nav-1" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1"><span class="text-2xl">🎨</span><span>Filters</span></button>
            <button onclick="switchTool(2)" id="nav-2" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1"><span class="text-2xl">⚡</span><span>Effects</span></button>
            <button onclick="switchTool(3)" id="nav-3" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1"><span class="text-2xl">🧼</span><span>Eraser</span></button>
            <button onclick="switchTool(4)" id="nav-4" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1"><span class="text-2xl">✂️</span><span>Crop</span></button>
            <button onclick="switchTool(5)" id="nav-5" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1"><span class="text-2xl">📊</span><span>Adjust</span></button>
        </div>
    </div>

    <script type="module">
        import { initEditor, loadSampleImage, triggerUpload, handleImageUpload, 
                 undo, redo, downloadImage, finishEditing, switchTool } from './js/editor-core.js';

        window.onload = () => {
            initEditor();
            loadSampleImage();
        };

        // Expose everything needed for inline onclicks
        window.triggerUpload = triggerUpload;
        window.handleImageUpload = handleImageUpload;
        window.undo = undo;
        window.redo = redo;
        window.downloadImage = downloadImage;
        window.finishEditing = finishEditing;
        window.switchTool = switchTool;
    </script>
</body>
</html>
